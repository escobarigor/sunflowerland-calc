<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SFL EcoCalculator</title>
  <meta name="description" content="Calculadora de economia para Sunflower Land — expansões, plantações, recursos e mais." />

  <!-- Fontes: Silkscreen (pixel, para o logo/títulos) + Fredoka (corpo, arredondada e amigável) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- ===================== CABEÇALHO ===================== -->
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark">🌻</span>
      <div class="brand-text">
        <h1>SFL EcoCalculator</h1>
        <p>Calculadora de economia &middot; Sunflower Land</p>
      </div>
    </div>
    <button id="theme-toggle" class="theme-toggle" title="Alternar tema" aria-label="Alternar tema">
      <span class="theme-icon">🌙</span>
    </button>
  </header>

  <!-- ===================== NAVEGAÇÃO (ABAS) ===================== -->
  <!-- data-tab liga o botão ao painel #tab-<id>. data-wave marca a fase do roadmap. -->
  <nav class="tab-bar" id="tab-bar">
    <button class="tab-btn active" data-tab="expansion">🏝️ Expansão</button>
    <button class="tab-btn" data-tab="crops">🌾 Plantações</button>
    <button class="tab-btn" data-tab="resources">🪵 Recursos</button>
    <button class="tab-btn" data-tab="cooking">🍳 Cozinha</button>
    <button class="tab-btn" data-tab="summary">📊 Resumo <span class="badge">API</span></button>
    <button class="tab-btn" data-tab="inventory">📦 Inventário <span class="badge">API</span></button>
    <button class="tab-btn" data-tab="settings">⚙️ Config</button>
  </nav>

  <main class="content">
    <!-- ===== ABA: EXPANSÃO (implementada como exemplo funcional) ===== -->
    <section class="tab-panel active" id="tab-expansion">
      <!-- conteúdo gerado por app.js → renderExpansionTab() -->
    </section>

    <!-- ===== ABA: PLANTAÇÕES (implementada) ===== -->
    <section class="tab-panel" id="tab-crops">
      <!-- conteúdo gerado por app.js → renderCropsTab() -->
    </section>

    <!-- ===== ABA: RECURSOS (implementada) ===== -->
    <section class="tab-panel" id="tab-resources">
      <!-- conteúdo gerado por app.js → renderResourcesTab() -->
    </section>

    <!-- ===== ABA: COZINHA (implementada) ===== -->
    <section class="tab-panel" id="tab-cooking">
      <!-- conteúdo gerado por app.js → renderCookingTab() -->
    </section>

    <!-- ===== ABA: RESUMO (implementada, usa API) ===== -->
    <section class="tab-panel" id="tab-summary">
      <!-- conteúdo gerado por app.js → renderSummaryTab() -->
    </section>

    <!-- ===== ABA: INVENTÁRIO (implementada, usa API) ===== -->
    <section class="tab-panel" id="tab-inventory">
      <!-- conteúdo gerado por app.js → renderInventoryTab() -->
    </section>

    <!-- ===== ABA: CONFIG (chave de API + debug) ===== -->
    <section class="tab-panel" id="tab-settings">
      <!-- conteúdo gerado por app.js → renderSettingsTab() -->
    </section>
  </main>

  <footer class="app-footer">
    <p>Projeto comunitário não-oficial. Não afiliado ao Sunflower Land.</p>
  </footer>

  <!-- Ordem importa: data → api → calc → tabs → app -->
  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/calc.js"></script>
  <script src="js/tabs.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
