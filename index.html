<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SFL EcoCalculator</title>
  <meta name="description" content="Calculadora de economia para Sunflower Land — expansões, plantações, recursos e mais." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Caminhos SEM pasta: os arquivos ficam na raiz do repositório -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ===================== CABEÇALHO ===================== -->
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark">🌻</span>
      <div class="brand-text">
        <h1>SFL EcoCalculator</h1>
        <p>Calculadora de economia &middot; Sunflower Land</p>
      </div>
    </div>
    <div class="header-actions">
      <!-- Widget de tradução automática (Google Translate) -->
      <div id="google_translate_element" class="translate-box notranslate"></div>
      <button id="theme-toggle" class="theme-toggle" title="Alternar tema" aria-label="Alternar tema">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
  </header>

  <!-- ===================== NAVEGAÇÃO (ABAS) ===================== -->
  <nav class="tab-bar" id="tab-bar">
    <button class="tab-btn active" data-tab="expansion">🏝️ Expansão</button>
    <button class="tab-btn" data-tab="crops">🌾 Plantações</button>
    <button class="tab-btn" data-tab="resources">🪵 Recursos</button>
    <button class="tab-btn" data-tab="cooking">🍳 Cozinha</button>
    <button class="tab-btn" data-tab="summary">📊 Resumo <span class="badge">API</span></button>
    <button class="tab-btn" data-tab="inventory">📦 Inventário <span class="badge">API</span></button>
    <button class="tab-btn" data-tab="settings">⚙️ Config</button>
  </nav>

  <main class="content">
    <section class="tab-panel active" id="tab-expansion"></section>
    <section class="tab-panel" id="tab-crops"></section>
    <section class="tab-panel" id="tab-resources"></section>
    <section class="tab-panel" id="tab-cooking"></section>
    <section class="tab-panel" id="tab-summary"></section>
    <section class="tab-panel" id="tab-inventory"></section>
    <section class="tab-panel" id="tab-settings"></section>
  </main>

  <footer class="app-footer">
    <p>Projeto comunitário não-oficial. Não afiliado ao Sunflower Land.</p>
    <p class="notranslate">Dados do jogo: github.com/sunflower-land/sunflower-land</p>
  </footer>

  <!-- Ordem importa: data → api → calc → tabs → app -->
  <script src="data.js"></script>
  <script src="api.js"></script>
  <script src="calc.js"></script>
  <script src="tabs.js"></script>
  <script src="app.js"></script>

  <!-- Tradução automática via Google Translate -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: "pt",
        includedLanguages: "en,es,fr,de,it,ru,zh-CN,ja,ko,ar,hi",
        autoDisplay: false
      }, "google_translate_element");
    }
  </script>
  <script type="text/javascript"
    src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
